<div class="signup-container">
    <h2>Business Sign Up</h2>
  
    <form #business_sign="ngForm" (ngSubmit)="sign(business_sign.value)">
      <mat-form-field appearance="fill">
        <mat-label>Business Name</mat-label>
        <input matInput placeholder="Enter your business name" name="businessName" [(ngModel)]="businessName" required>
      </mat-form-field>
  
      <mat-form-field appearance="fill">
        <mat-label>Email</mat-label>
        <input matInput type="email" placeholder="Enter your email" name="email" [(ngModel)]="email" required>
      </mat-form-field>
  
      <mat-form-field appearance="fill">
        <mat-label>Password</mat-label>
        <input matInput type="password" placeholder="Enter your password" name="password" [(ngModel)]="password" required>
      </mat-form-field>
  
      <mat-form-field appearance="fill">
        <mat-label>Confirm Password</mat-label>
        <input matInput type="password" placeholder="Confirm your password" name="confirmPassword" [(ngModel)]="confirmPassword" required>
      </mat-form-field>
  
      <button mat-raised-button color="primary">Sign Up</button>
    </form>
  </div>
